name: remi
description: Remi — Ambient Memory. Bridge between thinking and documenting.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  home_widget: ^0.6.0

  # Navigation
  go_router: ^13.2.0

  # Local Database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # AI / Gemini

  # Voice Input
  speech_to_text: ^7.3.0
  permission_handler: ^11.3.1

  # Animations
  lottie: ^3.1.2
  video_player: ^2.8.2
  supabase_flutter: ^2.6.0

  # Storage & Security
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.3

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Haptics
  vibration: ^2.0.0

  # Background processing
  workmanager: ^0.6.0

  # Fonts & UI
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.4.2
  intl: ^0.19.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FAF9F6"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo/
    - assets/icons/
    - assets/fonts/
